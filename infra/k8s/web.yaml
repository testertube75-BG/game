apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: bcgs
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/bcgs/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: bcgs-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: bcgs
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
