groups:
  - name: bcgs-platform
    rules:
      - alert: HighApiLatency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 0.25
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency is above 250ms
      - alert: RealtimeShardSaturation
        expr: process_resident_memory_bytes / container_spec_memory_limit_bytes > 0.75
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Realtime shard memory is approaching reconnect risk threshold
      - alert: WalletSettlementBacklog
        expr: kafka_consumergroup_lag{topic=~"wallet.*"} > 1000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Wallet settlement consumer lag is high
